networks:
  blur-network:
    driver: bridge

volumes:
  neo4j_data:
  mysql_data:
  mongo_data:
  redis_data:
  kafka_data:

services:

  # ================================================================
  # INFRASTRUCTURE
  # ================================================================

  neo4j:
    image: neo4j:5
    container_name: neo4j
    networks: [blur-network]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  keycloak-mysql:
    image: mysql:8.0
    container_name: keycloak-mysql
    networks: [blur-network]
    environment:
      MYSQL_DATABASE: keycloak_db
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: ${MYSQL_KEYCLOAK_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=64M
      --max-connections=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongo:
    image: mongo:6.0
    container_name: mongo
    networks: [blur-network]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 0.25 --maxConns 200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:alpine
    container_name: redis
    networks: [blur-network]
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --maxclients 1000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    networks: [blur-network]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/9093) 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    networks: [blur-network]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./blur-realm.json:/opt/keycloak/data/import/blur-realm.json
    command: start-dev --import-realm
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-mysql
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${MYSQL_KEYCLOAK_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # KC_HOSTNAME_URL bị xóa từ Keycloak 25+ → dùng KC_HOSTNAME
      # PHẢI là URL đầy đủ (có scheme). Nếu chỉ ghi "blur.io.vn" thì Keycloak
      # giữ scheme+port từ request nội bộ → iss = http://blur.io.vn:8080/realms/blur (SAI).
      # Set full URL → iss = https://blur.io.vn/realms/blur, khớp KEYCLOAK_ISSUER_URI.
      KC_HOSTNAME: https://blur.io.vn
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: warn
      JAVA_OPTS_APPEND: "-Xmx512m -Xms256m"
    depends_on:
      keycloak-mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8080) 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s

  # ================================================================
  # MICROSERVICES
  # ================================================================

  user-service:
    image: vansy1001/user-service:latest
    container_name: user-service
    networks: [blur-network]
    environment:
      SERVER_PORT: 8081
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TIME_OUT: 2000ms
      MAX_ACTIVE: 8
      MAX_IDLE: 8
      MIN_IDLE: 0
      TIME_TO_LIVE: 600000
      # user-service gọi nội bộ sang content/communication; nếu thiếu sẽ fallback localhost → connection refused
      CONTENT_SERVICE_URL: http://content-service:8082
      NOTIFICATION_SERVICE_URL: http://communication-service:8083
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: blur
      # issuer-uri phải khớp với iss claim trong JWT (KC_HOSTNAME_URL = https://blur.io.vn)
      KEYCLOAK_ISSUER_URI: https://blur.io.vn/realms/blur
      # jwk-set-uri dùng internal Docker DNS để fetch keys (không qua internet)
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/token
      KEYCLOAK_LOGOUT_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/logout
      KEYCLOAK_CLIENT_ID_SERVICE: blur-service-account
      KEYCLOAK_CLIENT_SECRET_SERVICE: ${KEYCLOAK_CLIENT_SECRET_SERVICE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SIGNER_KEY: ${SIGNER_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      FIELD_ENCRYPTION_HMAC_KEY: ${FIELD_ENCRYPTION_HMAC_KEY}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms128m"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/127.0.0.1/8081) 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  content-service:
    image: vansy1001/content-service:latest
    container_name: content-service
    networks: [blur-network]
    environment:
      SERVER_PORT: 8082
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MONGODB_URI: mongodb://root:${MONGO_ROOT_PASSWORD_ENCODED}@mongo:27017/content-service?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TIME_OUT: 2000ms
      MAX_ACTIVE: 8
      MAX_IDLE: 8
      MIN_IDLE: 0
      TIME_TO_LIVE: 600000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      USER_SERVICE_URL: http://user-service:8081
      # content-service Feign ProfileClient đọc PROFILE_SERVICE_URL (không phải USER_SERVICE_URL).
      # Thiếu biến này → fallback localhost:8081 → connection refused → getProfile null → tạo post lỗi.
      PROFILE_SERVICE_URL: http://user-service:8081
      # content-service ModerationResultConsumer gọi communication-service qua Feign để gửi WebSocket update.
      # Thiếu biến này → fallback localhost:8083/chat → connection refused.
      COMMUNICATION_SERVICE_URL: http://communication-service:8083/chat
      # issuer-uri phải khớp với iss claim trong JWT (KC_HOSTNAME_URL = https://blur.io.vn)
      KEYCLOAK_ISSUER_URI: https://blur.io.vn/realms/blur
      # jwk-set-uri dùng internal Docker DNS để fetch keys (không qua internet)
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms128m"
    depends_on:
      neo4j:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_healthy
      communication-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/127.0.0.1/8082) 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  communication-service:
    image: vansy1001/communication-service:latest
    container_name: communication-service
    networks:
      blur-network:
        aliases:
          - chat-service
    environment:
      SERVER_PORT: 8083
      MONGODB_URI: mongodb://root:${MONGO_ROOT_PASSWORD_ENCODED}@mongo:27017/communication-service?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TIME_OUT: 2000ms
      MAX_ACTIVE: 8
      MAX_IDLE: 8
      MIN_IDLE: 0
      TIME_TO_LIVE: 600000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      USER_SERVICE_URL: http://user-service:8081
      PROFILE_SERVICE_URL: http://user-service:8081
      # issuer-uri phải khớp với iss claim trong JWT (KC_HOSTNAME_URL = https://blur.io.vn)
      KEYCLOAK_ISSUER_URI: https://blur.io.vn/realms/blur
      # jwk-set-uri dùng internal Docker DNS để fetch keys (không qua internet)
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash}
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms128m"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/127.0.0.1/8083) 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  model-service:
    image: vansy1001/model-service:latest
    container_name: model-service
    networks: [blur-network]
    environment:
      # Python/aiokafka đọc KAFKA_BOOTSTRAP_SERVERS trực tiếp, không dùng SPRING_ prefix
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KAFKA_CONSUMER_GROUP: model-service
      KAFKA_REQUEST_TOPIC: comment-moderation-request
      KAFKA_RESULT_TOPIC: comment-moderation-results
      MODEL_PATH: models/phobert_toxic_v2_20260413_144753
      MODEL_VERSION: phobert_toxic_FINAL
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - /opt/blur/models:/app/models
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s

  api-gateway:
    image: vansy1001/api-gateway:latest
    container_name: api-gateway
    networks: [blur-network]
    environment:
      SERVER_PORT: 8888
      USER_SERVICE_URL: http://user-service:8081
      CONTENT_SERVICE_URL: http://content-service:8082
      COMMUNICATION_SERVICE_URL: http://communication-service:8083
      # issuer-uri phải khớp với iss claim trong JWT (KC_HOSTNAME_URL = https://blur.io.vn)
      KEYCLOAK_ISSUER_URI: https://blur.io.vn/realms/blur
      # jwk-set-uri dùng internal Docker DNS để fetch keys (không qua internet)
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/token
      KEYCLOAK_LOGOUT_URI: http://keycloak:8080/realms/blur/protocol/openid-connect/logout
      KEYCLOAK_CLIENT_ID_GATEWAY: blur-api-gateway
      KEYCLOAK_CLIENT_SECRET_GATEWAY: ${KEYCLOAK_CLIENT_SECRET_GATEWAY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    depends_on:
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      communication-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/127.0.0.1/8888) 2>/dev/null && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    image: vansy1001/blur-frontend:latest
    container_name: frontend
    networks: [blur-network]
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
