version: '3.8'

services:
  # ====================
  # Databases
  # ====================
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data


  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  # ====================
  # Kafka (KRaft — no Zookeeper)
  # ====================
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # ====================
  # Microservices
  # ====================
  api-gateway:
    build:
      context: ../Backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8888:8888"
    expose:
      - 8888
    depends_on:
      - identity-service
      - profile-service
      - notification-service
      - chat-service
      - post-service
      - story-service

  identity-service:
    build:
      context: ../Backend/IdentityService
      dockerfile: Dockerfile
    container_name: identity-service
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  profile-service:
    build:
      context: ../Backend/profile-service
      dockerfile: Dockerfile
    container_name: profile-service
    ports:
      - "8081:8081"
    depends_on:
      - neo4j

  notification-service:
    build:
      context: ../Backend/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
      - redis
      - mongo

  chat-service:
    build:
      context: ../Backend/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    ports:
      - "8083:8083"
      - "8099:8099"
    depends_on:
      - mongo
      - redis

  post-service:
    build:
      context: ../Backend/post-service
      dockerfile: Dockerfile
    container_name: post-service
    ports:
      - "8084:8084"
    depends_on:
      - mongo

  story-service:
    build:
      context: ../Backend/story-service
      dockerfile: Dockerfile
    container_name: story-service
    ports:
      - "8086:8086"
    depends_on:
      - mongo
  nginx:
    image: nginx:1.23.3
    ports:
      - 80:80
    volumes:
      - ../frontend/build:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
# ====================
# Volumes
# ====================
volumes:
  neo4j_data:
  mongo_data:

    
