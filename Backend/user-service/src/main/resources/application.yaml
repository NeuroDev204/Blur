server:
  port: ${SERVER_PORT:8081}
  address: 0.0.0.0
  servlet:
    context-path: /

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:user-service}
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI}
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: 2
      timeout: ${REDIS_TIME_OUT}
      lettuce:
        pool:
          max-active: ${MAX_ACTIVE}
          max-idle: ${MAX_IDLE}
          min-idle: ${MIN_IDLE}

  cache:
    type: redis

keycloak:
  admin:
    server-url: ${KEYCLOAK_URL}
    realm: ${KEYCLOAK_REALM}
    client-id: ${KEYCLOAK_CLIENT_ID_SERVICE}
    client-secret: ${KEYCLOAK_CLIENT_SECRET_SERVICE}
encryption:
  field-key: ${FIELD_ENCRYPTION_KEY}
  hmac-key: ${FIELD_ENCRYPTION_HMAC_KEY}

app:
  services:
    profile: ${PROFILE_SERVICE_URL:http://localhost:8081}
    notification: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
    content: ${CONTENT_SERVICE_URL:http://localhost:8082}
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException.InternalServerError
          - feign.FeignException.ServiceUnavailable
        ignore-exceptions:
          - feign.FeignException.BadRequest
          - feign.FeignException.NotFound
    instances:
      contentServiceCB:
        base-config: default
      googleOAuthCB:
        base-config: default
        sliding-window-size: 5
        failure-rate-threshold: 40
        wait-duration-in-open-state: 60s
      keycloakCB:
        base-config: default
        failure-rate-threshold: 30
        wait-duration-in-open-state: 10s
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
        ignore-exceptions:
          - feign.FeignException.BadRequest
          - feign.FeignException.NotFound
    instances:
      contentServiceRetry:
        base-config: default
      googleOAuthRetry:
        base-config: default
        max-attempts: 2
        wait-duration: 1s
      keycloakRetry:
        base-config: default
        max-attempts: 3
        wait-duration: 200ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,caches,metrics
  endpoint:
    health:
      show-details: always
    caches:
      enabled: true
logging:
  level:
    org.springframework.data.neo4j.cypher.deprecation: ERROR
